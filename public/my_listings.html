<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your listings on CampusTrade. Edit, delete, or mark items as sold.">
    <title>My Listings — CampusTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#7C3AED', accent: '#10B981', danger: '#EF4444' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/custom.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div class="flex items-center justify-between mb-8 fade-in">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight dark:text-gray-100">My Listings</h1>
                <p class="text-gray-500 mt-1 text-sm dark:text-gray-400">Manage the items you've listed for sale.</p>
            </div>
            <div class="flex items-center gap-3">

                <div class="hidden sm:flex bg-white rounded-lg border border-gray-200 p-0.5 dark:bg-gray-800 dark:border-gray-700">
                    <button id="btn-view-card" onclick="toggleView('card')" class="px-3 py-1.5 rounded-md text-xs font-medium bg-indigo-600 text-white transition-all">
                        Cards
                    </button>
                    <button id="btn-view-table" onclick="toggleView('table')" class="px-3 py-1.5 rounded-md text-xs font-medium text-gray-500 hover:text-gray-700 transition-all dark:text-gray-400">
                        Table
                    </button>
                </div>
                <a href="create_listing.html" class="px-4 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors" id="btn-new-listing">
                    + New Listing
                </a>
            </div>
        </div>

        <div id="card-view" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 stagger-in">

        </div>

        <div id="table-view" class="hidden">
            <div class="bg-white rounded-xl shadow-md overflow-hidden dark:bg-gray-800">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b border-gray-100 dark:bg-gray-900 dark:border-gray-800">
                            <tr>
                                <th class="text-left py-3 px-4 text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-400">Item</th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-400">Price</th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-400">Status</th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-400">Offers</th>
                                <th class="text-left py-3 px-4 text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-400">Posted</th>
                                <th class="text-right py-3 px-4 text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-400">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-50">

                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="empty-state" class="hidden"></div>

        <div id="edit-form-container" class="hidden"></div>

    </main>

    <div id="delete-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div class="modal-overlay absolute inset-0" onclick="closeDeleteModal()"></div>
        <div class="modal-content relative bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4 z-10 dark:bg-gray-800">
            <div class="text-center">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-2 dark:text-gray-100">Delete Listing?</h3>
                <p class="text-sm text-gray-500 mb-1 dark:text-gray-400">Are you sure you want to delete this listing?</p>
                <p class="text-xs text-gray-400 mb-6 dark:text-gray-500">Deleted listings are archived, not permanently removed.</p>
                <div class="flex gap-3">
                    <button onclick="closeDeleteModal()" class="flex-1 py-2.5 border border-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700" id="btn-cancel-delete">
                        Cancel
                    </button>
                    <button id="btn-confirm-delete" onclick="confirmDelete()" class="flex-1 py-2.5 bg-red-500 text-white text-sm font-medium rounded-lg hover:bg-red-600 transition-colors">
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="border-t border-gray-100 mt-16 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-xs text-gray-400 dark:text-gray-500">
            &copy; 2026 CampusTrade. Built for students, by students.
        </div>
    </footer>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/my_listings.js"></script>
</body>
</html>
