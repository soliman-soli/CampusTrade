<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View listing details and make an offer on CampusTrade.">
    <title>Listing Details — CampusTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#7C3AED', accent: '#10B981', danger: '#EF4444' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/custom.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <a href="dashboard.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-indigo-600 mb-6 transition-colors dark:text-gray-400" id="btn-back">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Listings
        </a>

        <div id="detail-skeleton" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white rounded-xl shadow-md p-4 animate-pulse dark:bg-gray-800">
                <div class="h-80 bg-gray-200 rounded-lg mb-4 dark:bg-gray-700"></div>
                <div class="flex gap-2">
                    <div class="w-20 h-20 bg-gray-200 rounded-lg dark:bg-gray-700"></div>
                    <div class="w-20 h-20 bg-gray-200 rounded-lg dark:bg-gray-700"></div>
                </div>
            </div>
            <div class="space-y-4 animate-pulse">
                <div class="h-6 bg-gray-200 rounded w-1/3 dark:bg-gray-700"></div>
                <div class="h-8 bg-gray-200 rounded w-3/4 dark:bg-gray-700"></div>
                <div class="h-10 bg-gray-200 rounded w-1/4 dark:bg-gray-700"></div>
                <div class="h-20 bg-gray-200 rounded dark:bg-gray-700"></div>
            </div>
        </div>

        <div id="detail-content" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8 fade-in">

            <div class="bg-white rounded-xl shadow-md p-4 dark:bg-gray-800">

                <div class="rounded-lg overflow-hidden mb-4 bg-gray-100 flex items-center justify-center dark:bg-gray-700" style="min-height: 320px;">
                    <img id="gallery-main" class="gallery-main-image w-full max-h-96 object-contain" src="" alt="Listing image">
                </div>

                <div id="gallery-thumbnails" class="flex gap-2 overflow-x-auto pb-2"></div>
            </div>

            <div>

                <div class="flex items-center gap-2 mb-3">
                    <span id="detail-category" class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-indigo-100 text-indigo-700"></span>
                    <span id="detail-condition"></span>
                    <span id="detail-status" class="ml-auto"></span>
                </div>

                <h1 id="detail-title" class="text-2xl font-bold text-gray-900 tracking-tight mb-2 dark:text-gray-100"></h1>

                <p id="detail-price" class="text-3xl font-bold text-indigo-600 mb-6"></p>

                <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl mb-6 dark:bg-gray-900">
                    <div id="seller-avatar" class="w-11 h-11 rounded-full bg-gradient-to-br from-indigo-400 to-violet-500 flex items-center justify-center shadow-sm">
                        <span class="text-sm text-white font-semibold" id="seller-initials"></span>
                    </div>
                    <div>
                        <p id="seller-name" class="text-sm font-semibold text-gray-800 dark:text-gray-200"></p>
                        <p id="seller-since" class="text-xs text-gray-400 dark:text-gray-500"></p>
                        <div id="seller-social-container" class="hidden mt-1">
                            <a id="seller-social-link" href="#" target="_blank" rel="noopener noreferrer" class="text-xs font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 flex items-center gap-1">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                Social Media
                            </a>
                        </div>
                    </div>
                </div>

                <div class="mb-8">
                    <h2 class="text-sm font-semibold text-gray-700 mb-2 dark:text-gray-300">Description</h2>
                    <p id="detail-description" class="text-sm text-gray-600 leading-relaxed whitespace-pre-line dark:text-gray-400"></p>
                </div>

                <div id="offer-section" class="hidden">
                    <div class="border-t border-gray-100 pt-6 dark:border-gray-800">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4 dark:text-gray-100">Make an Offer</h2>
                        <form id="form-offer" class="space-y-4" onsubmit="return false;">
                            <div>
                                <label for="offer-amount" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Offer Amount (EGP)</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-medium dark:text-gray-500">EGP</span>
                                    <input type="number" id="offer-amount" min="0.01" step="0.01" required
                                        class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700">
                                </div>
                            </div>
                            <div>
                                <label for="offer-message" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Message to Seller (optional)</label>
                                <textarea id="offer-message" maxlength="500" rows="3"
                                    class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm resize-none dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="Introduce yourself, ask questions, or propose a meetup..."></textarea>
                            </div>
                            <button type="submit" id="btn-send-offer"
                                class="w-full py-3 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-semibold rounded-xl shadow-md hover:shadow-lg hover:from-emerald-600 hover:to-teal-600 transition-all duration-200 text-sm">
                                Send Offer
                            </button>
                        </form>
                    </div>
                </div>

                <div id="manage-offers-section" class="hidden">
                    <div class="border-t border-gray-100 pt-6 dark:border-gray-800">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4 dark:text-gray-100">Offers Received</h2>
                        <div id="offers-list" class="space-y-3"></div>
                        <div id="offers-empty" class="hidden"></div>
                    </div>
                </div>

                <div id="sold-message" class="hidden">
                    <div class="border-t border-gray-100 pt-6 dark:border-gray-800">
                        <div class="p-4 bg-red-50 rounded-xl text-center">
                            <p class="text-sm font-medium text-red-600">This item has been sold.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="border-t border-gray-100 mt-16 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-xs text-gray-400 dark:text-gray-500">
            &copy; 2026 CampusTrade. Built for students, by students.
        </div>
    </footer>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/listing_details.js"></script>
</body>
</html>
