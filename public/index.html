<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CampusTrade — The student marketplace for academic gear. Buy and sell textbooks, electronics, lab supplies, and more with fellow students.">
    <title>CampusTrade — Student Marketplace for Academic Gear</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#7C3AED',
                        accent: '#10B981',
                        danger: '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="assets/css/custom.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

    <main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-indigo-700 to-violet-700 hero-pattern relative overflow-hidden">

        <div class="absolute top-20 left-10 w-72 h-72 bg-white/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-violet-500/10 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-400/5 rounded-full blur-3xl"></div>

        <div class="relative z-10 w-full max-w-md mx-4 fade-in">

            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 backdrop-blur-md rounded-2xl mb-4 shadow-xl">
                    <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">CampusTrade</h1>
                <p class="text-indigo-200 mt-2 text-sm">The student marketplace for academic gear.</p>
            </div>

            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden dark:bg-gray-800">

                <div class="flex border-b border-gray-100 relative dark:border-gray-800">
                    <button id="tab-login" type="button"
                        class="flex-1 py-4 text-sm font-semibold text-center transition-colors duration-200 text-indigo-600"
                        onclick="switchTab('login')">
                        Login
                    </button>
                    <button id="tab-register" type="button"
                        class="flex-1 py-4 text-sm font-semibold text-center transition-colors duration-200 text-gray-400 dark:text-gray-500"
                        onclick="switchTab('register')">
                        Register
                    </button>

                    <div id="tab-indicator" class="absolute bottom-0 left-0 w-1/2 h-0.5 bg-indigo-600 tab-indicator"></div>
                </div>

                <div class="relative p-6">

                    <form id="form-login" class="tab-content active space-y-5" onsubmit="return false;">

                        <div>
                            <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Email Address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                                    </svg>
                                </div>
                                <input type="email" id="login-email" name="email" required
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="you@university.edu">
                            </div>
                        </div>

                        <div>
                            <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <input type="password" id="login-password" name="password" required
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="Enter your password">
                            </div>
                            <div class="flex justify-end mt-1.5">
                                <a href="forgot_password.html" class="text-xs text-indigo-600 font-medium hover:underline dark:text-indigo-400">Forgot Password?</a>
                            </div>
                        </div>

                        <button type="submit" id="btn-login"
                            class="w-full py-3 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold rounded-xl shadow-md hover:shadow-lg hover:from-indigo-700 hover:to-violet-700 transition-all duration-200 text-sm">
                            Sign In
                        </button>

                        <p class="text-center text-xs text-gray-400 mt-3 dark:text-gray-500">
                            Don't have an account?
                            <button type="button" class="text-indigo-600 font-medium hover:underline" onclick="switchTab('register')">Create one</button>
                        </p>
                    </form>

                    <form id="form-register" class="tab-content hidden space-y-4" onsubmit="return false;">

                        <div>
                            <label for="reg-name" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Full Name</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                </div>
                                <input type="text" id="reg-name" name="full_name" required
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="Alice Johnson">
                            </div>
                        </div>

                        <div>
                            <label for="reg-email" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Email Address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                                    </svg>
                                </div>
                                <input type="email" id="reg-email" name="email" required
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="you@university.edu">
                            </div>
                        </div>

                        <div>
                            <label for="reg-phone" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Phone Number</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                    </svg>
                                </div>
                                <input type="tel" id="reg-phone" name="phone" required
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="1234567890">
                            </div>
                        </div>

                        <div>
                            <label for="reg-social" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Social Media Link (Optional)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                                    </svg>
                                </div>
                                <input type="url" id="reg-social" name="social_media"
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="https://instagram.com/username">
                            </div>
                        </div>

                        <div>
                            <label for="reg-password" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <input type="password" id="reg-password" name="password" required minlength="8"
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="Min. 8 characters">
                            </div>
                        </div>

                        <div>
                            <label for="reg-confirm" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Confirm Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                    </svg>
                                </div>
                                <input type="password" id="reg-confirm" name="confirm_password" required
                                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700"
                                    placeholder="Re-enter your password">
                            </div>

                            <p id="password-match-msg" class="mt-1.5 text-xs hidden"></p>
                        </div>

                        <button type="submit" id="btn-register"
                            class="w-full py-3 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold rounded-xl shadow-md hover:shadow-lg hover:from-indigo-700 hover:to-violet-700 transition-all duration-200 text-sm">
                            Create Account
                        </button>

                        <p class="text-center text-xs text-gray-400 mt-2 dark:text-gray-500">
                            Already have an account?
                            <button type="button" class="text-indigo-600 font-medium hover:underline" onclick="switchTab('login')">Sign in</button>
                        </p>
                    </form>
                </div>
            </div>

            <p class="text-center text-indigo-300/60 text-xs mt-6">&copy; 2026 CampusTrade. Built for students, by students.</p>
        </div>
    </main>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
