<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse all available listings on CampusTrade. Find textbooks, electronics, lab supplies, and more from fellow students.">
    <title>Browse Listings — CampusTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#7C3AED', accent: '#10B981', danger: '#EF4444' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/custom.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div class="mb-8 fade-in">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight dark:text-gray-100">Browse Listings</h1>
            <p class="text-gray-500 mt-1 text-sm dark:text-gray-400">Discover academic gear from fellow students on campus.</p>
        </div>

        <section id="filter-bar" class="bg-white rounded-xl shadow-md p-5 mb-8 fade-in dark:bg-gray-800">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4 items-end">

                <div class="lg:col-span-2">
                    <label for="filter-search" class="block text-xs font-medium text-gray-500 mb-1 dark:text-gray-400">Search</label>
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input type="text" id="filter-search" placeholder="Search by title or keyword..."
                            class="w-full pl-9 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700">
                    </div>
                </div>

                <div>
                    <label for="filter-category" class="block text-xs font-medium text-gray-500 mb-1 dark:text-gray-400">Category</label>
                    <select id="filter-category" class="w-full py-2.5 px-3 border border-gray-200 rounded-lg text-sm bg-white dark:border-gray-700 dark:bg-gray-800 dark:bg-gray-800 dark:text-white dark:border-gray-700">
                        <option value="">All Categories</option>

                    </select>
                </div>

                <div>
                    <label for="filter-condition" class="block text-xs font-medium text-gray-500 mb-1 dark:text-gray-400">Condition</label>
                    <select id="filter-condition" class="w-full py-2.5 px-3 border border-gray-200 rounded-lg text-sm bg-white dark:border-gray-700 dark:bg-gray-800 dark:bg-gray-800 dark:text-white dark:border-gray-700">
                        <option value="">Any Condition</option>
                        <option value="New">New</option>
                        <option value="Like New">Like New</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 dark:text-gray-400">Price Range</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="filter-min-price" placeholder="Min"
                            class="w-full py-2.5 px-3 border border-gray-200 rounded-lg text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700" min="0" step="0.01">
                        <span class="text-gray-400 text-xs dark:text-gray-500">–</span>
                        <input type="number" id="filter-max-price" placeholder="Max"
                            class="w-full py-2.5 px-3 border border-gray-200 rounded-lg text-sm dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:border-gray-700" min="0" step="0.01">
                    </div>
                </div>

                <div class="flex gap-2">
                    <button id="btn-apply-filter" onclick="applyFilters()"
                        class="flex-1 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
                        Apply
                    </button>
                    <button id="btn-reset-filter" onclick="resetFilters()"
                        class="px-3 py-2.5 text-sm text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors dark:text-gray-400 dark:hover:bg-indigo-900/30">
                        Reset
                    </button>
                </div>
            </div>
        </section>

        <div class="flex items-center justify-between mb-4">
            <p id="results-count" class="text-sm text-gray-500 dark:text-gray-400"></p>
        </div>

        <div id="listings-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 stagger-in">

        </div>

        <div id="empty-state" class="hidden"></div>

    </main>

    <footer class="border-t border-gray-100 mt-16 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-xs text-gray-400 dark:text-gray-500">
            &copy; 2026 CampusTrade. Built for students, by students.
        </div>
    </footer>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
