<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage your offers on CampusTrade. Track offers you've made and respond to offers on your listings.">
    <title>My Offers — CampusTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#7C3AED', accent: '#10B981', danger: '#EF4444' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/custom.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">

    <div id="navbar-container"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div class="mb-8 fade-in">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight dark:text-gray-100">My Offers</h1>
            <p class="text-gray-500 mt-1 text-sm dark:text-gray-400">Track your sent offers and manage offers received on your listings.</p>
        </div>

        <div class="bg-white rounded-xl shadow-md mb-8 fade-in dark:bg-gray-800">
            <div class="flex border-b border-gray-100 relative dark:border-gray-800">
                <button id="tab-made" type="button" onclick="switchOffersTab('made')"
                    class="flex-1 py-4 text-sm font-semibold text-center transition-colors duration-200 text-indigo-600">
                    Offers I Made
                    <span id="made-count" class="ml-1.5 px-2 py-0.5 rounded-full text-xs bg-indigo-100 text-indigo-600"></span>
                </button>
                <button id="tab-received" type="button" onclick="switchOffersTab('received')"
                    class="flex-1 py-4 text-sm font-semibold text-center transition-colors duration-200 text-gray-400 dark:text-gray-500">
                    Offers on My Listings
                    <span id="received-count" class="ml-1.5 px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-400"></span>
                </button>
                <div id="offers-tab-indicator" class="absolute bottom-0 left-0 w-1/2 h-0.5 bg-indigo-600 tab-indicator"></div>
            </div>
        </div>

        <div id="content-made" class="space-y-4">

        </div>

        <div id="content-received" class="hidden space-y-4">

        </div>

    </main>

    <footer class="border-t border-gray-100 mt-16 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-xs text-gray-400 dark:text-gray-500">
            &copy; 2026 CampusTrade. Built for students, by students.
        </div>
    </footer>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/my_offers.js"></script>
</body>
</html>
