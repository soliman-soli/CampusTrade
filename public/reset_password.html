<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — CampusTrade</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#7C3AED', accent: '#10B981', danger: '#EF4444' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/custom.css">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen dark:bg-gray-900">
    <main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 via-indigo-700 to-violet-700 hero-pattern relative overflow-hidden">
        <div class="absolute top-20 left-10 w-72 h-72 bg-white/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-violet-500/10 rounded-full blur-3xl"></div>
        <div class="relative z-10 w-full max-w-md mx-4 fade-in">
            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden p-8 dark:bg-gray-800">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Set New Password</h2>
                    <p class="text-sm text-gray-500 mt-2 dark:text-gray-400">Please enter your new password below.</p>
                </div>
                <form id="form-reset-password" onsubmit="return false;" class="space-y-5">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">New Password</label>
                        <input type="password" id="password" required minlength="8"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white"
                            placeholder="Min. 8 characters">
                    </div>
                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1.5 dark:text-gray-300">Confirm Password</label>
                        <input type="password" id="confirm_password" required minlength="8"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 transition-all dark:border-gray-700 dark:bg-gray-800 dark:text-white"
                            placeholder="Re-enter password">
                    </div>
                    <button type="submit" id="btn-submit"
                        class="w-full py-3 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold rounded-xl shadow-md hover:shadow-lg hover:from-indigo-700 hover:to-violet-700 transition-all duration-200 text-sm">
                        Reset Password
                    </button>
                </form>
            </div>
        </div>
    </main>
    <script src="assets/js/utils.js"></script>
    <script>
        document.getElementById('form-reset-password').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                showToast('Passwords do not match.', 'error');
                return;
            }
            if (password.length < 8) {
                showToast('Password must be at least 8 characters.', 'error');
                return;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) {
                showToast('Invalid or missing reset token.', 'error');
                return;
            }
            
            setLoadingState(btn, true);
            try {
                const formData = new FormData();
                formData.append('action', 'reset_password');
                formData.append('token', token);
                formData.append('password', password);
                
                const response = await fetch(`${API_BASE}/auth/auth.php`, {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Password reset successfully! You can now log in.', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showToast(data.error || 'Failed to reset password.', 'error');
                }
            } catch (error) {
                showToast('Network error.', 'error');
            } finally {
                setLoadingState(btn, false);
            }
        });
    </script>
</body>
</html>
